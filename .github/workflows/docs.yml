name: Build and Deploy Documentation

on:
  push:
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'mkdocs.zh-CN.yml'
      - 'overrides/**'
      - 'requirements.txt'
      - '.github/workflows/docs.yml'
  pull_request:
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'mkdocs.zh-CN.yml'
      - 'overrides/**'
      - 'requirements.txt'
      - '.github/workflows/docs.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      SITE_URL_ROOT: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/
      SITE_URL_ZH_CN: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/zh-CN/
      REPO_URL: https://github.com/${{ github.repository }}
      REPO_NAME: ${{ github.repository }}
      EDIT_URI_JA: edit/${{ github.ref_name }}/docs/
      EDIT_URI_ZH_CN: edit/${{ github.ref_name }}/docs/zh-CN/
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: mkdocs-${{ hashFiles('**/requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs-material
          pip install mkdocs-git-revision-date-localized-plugin
          pip install mkdocs-minify-plugin

      - name: Build Japanese site
        run: mkdocs build -f mkdocs.yml -d dist

      - name: Build Simplified Chinese site
        run: mkdocs build -f mkdocs.zh-CN.yml -d dist/zh-CN

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref_name == github.event.repository.default_branch
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
